name: Update Dashboard

on:
  schedule:
    - cron: '0 12 * * 0'  # Sunday noon UTC (7am ET)
  workflow_dispatch:

jobs:
  update-site:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd pipeline && npm ci

      - name: Generate updates
        id: update
        run: cd pipeline && node update-site.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit & push
        if: steps.update.outputs.has_updates == 'true'
        run: |
          git config user.name "checks.fail bot"
          git config user.email "bot@checks.fail"
          git add index.html data/last-site-update.json
          git commit -m "update: dashboard $(date -u +%Y-%m-%d)"
          git pull --rebase
          git push
